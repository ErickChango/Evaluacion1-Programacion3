<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>RentaFácil</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <h1>RentaFácil - Gestión de Vehículos</h1>

  <section>
    <h2>Crear / Actualizar Vehículo</h2>
    <input type="hidden" id="vehiculoId" />
    <input type="text" id="modelo" placeholder="Modelo" /><br/>
    <input type="text" id="categoria" placeholder="Categoría" /><br/>
    <input type="text" id="descripcion" placeholder="Descripción (opcional)" /><br/>
    <input type="number" id="precioPorDia" placeholder="Precio por día" /><br/>
    <input type="number" id="unidadesDisponibles" placeholder="Unidades disponibles" /><br/>
    <button onclick="guardar()">Guardar</button>
    <button onclick="limpiar()">Limpiar</button>
  </section>

  <section>
    <h2>Buscar por ID</h2>
    <input type="number" id="buscarId" placeholder="ID" />
    <button onclick="buscarPorId()">Buscar</button>
  </section>

  <section>
    <h2>Listar Todos</h2>
    <button onclick="listarTodos()">Listar</button>
  </section>

  <section>
    <h2>Eliminar</h2>
    <input type="number" id="eliminarId" placeholder="ID" />
    <button onclick="eliminar()">Eliminar</button>
  </section>

  <section>
    <h2>Consultas</h2>

    <p><strong>Por categoría y unidades disponibles</strong></p>
    <input type="text" id="qCategoria" placeholder="Categoría" />
    <input type="number" id="qMinUnidades" placeholder="Mín. unidades" value="0" />
    <button onclick="buscarPorCategoria()">Buscar</button>

    <p><strong>Por rango de precio</strong></p>
    <input type="number" id="qPrecioMin" placeholder="Precio mínimo" />
    <input type="number" id="qPrecioMax" placeholder="Precio máximo" />
    <button onclick="buscarPorPrecio()">Buscar</button>

    <p><strong>Buscar por modelo</strong></p>
    <input type="text" id="qModelo" placeholder="Ej: toyota" />
    <button onclick="buscarPorModelo()">Buscar</button>
  </section>

  <section>
    <h2>Respuesta del servidor</h2>
    <pre id="respuesta">Aquí aparecera la respuesta...</pre>
  </section>

  <script src="app.js"></script>
</body>
</html>
